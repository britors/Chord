<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shell" x1="92" y1="72" x2="420" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#242445"/>
      <stop offset="1" stop-color="#101023"/>
    </linearGradient>
    <linearGradient id="accent" x1="124" y1="380" x2="388" y2="142" gradientUnits="userSpaceOnUse">
      <stop stop-color="#69D4FF"/>
      <stop offset=".52" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#7157E8"/>
    </linearGradient>
    <linearGradient id="rim" x1="106" y1="82" x2="410" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7774B8"/>
      <stop offset=".45" stop-color="#46456F"/>
      <stop offset="1" stop-color="#2B2A50"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#080814" flood-opacity=".55"/>
    </filter>
  </defs>

  <!-- A terminal that is also the body of a string instrument. -->
  <g filter="url(#shadow)">
    <rect x="72" y="64" width="368" height="384" rx="88" fill="url(#shell)"
          stroke="url(#rim)" stroke-width="8"/>
    <path d="M76 164H436" stroke="#36365D" stroke-width="8"/>

    <!-- Window controls echo three notes in a chord. -->
    <circle cx="126" cy="116" r="12" fill="#69D4FF"/>
    <circle cx="166" cy="116" r="12" fill="#A78BFA"/>
    <circle cx="206" cy="116" r="12" fill="#7157E8"/>

    <!-- Terminal prompt, reduced to a strong small-size glyph. -->
    <path d="M126 210L166 242L126 274" fill="none" stroke="#F1F0FF"
          stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M190 274H250" stroke="#F1F0FF" stroke-width="20" stroke-linecap="round"/>

    <!-- Three strings run through the terminal; their waves form one chord. -->
    <path d="M292 186V382" stroke="#343457" stroke-width="22" stroke-linecap="round"/>
    <path d="M340 186V382" stroke="#343457" stroke-width="22" stroke-linecap="round"/>
    <path d="M388 186V382" stroke="#343457" stroke-width="22" stroke-linecap="round"/>

    <path d="M292 186C258 224 326 270 292 318C276 340 278 362 292 382"
          fill="none" stroke="url(#accent)" stroke-width="12" stroke-linecap="round"/>
    <path d="M340 186C306 222 374 260 340 300C306 340 374 360 340 382"
          fill="none" stroke="url(#accent)" stroke-width="12" stroke-linecap="round"/>
    <path d="M388 186C354 216 422 246 388 278C354 310 422 346 388 382"
          fill="none" stroke="url(#accent)" stroke-width="12" stroke-linecap="round"/>

    <!-- Bridge / common baseline: separate strings resolve together. -->
    <rect x="270" y="378" width="140" height="20" rx="10" fill="#ECEAFF"/>
    <circle cx="292" cy="388" r="6" fill="#7157E8"/>
    <circle cx="340" cy="388" r="6" fill="#7157E8"/>
    <circle cx="388" cy="388" r="6" fill="#7157E8"/>
  </g>
</svg>
